services:
  frontend:
    build: .
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-net

  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://cache:6379
      - CACHE_TTL_SECONDS=300
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  cache:
    image: redis:7-alpine

    volumes:
      - redis-data:/data

    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

    restart: unless-stopped

    networks:
      - backend-net

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:

networks:
  frontend-net:
  backend-net:
